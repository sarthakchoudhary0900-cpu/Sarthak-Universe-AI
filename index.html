# Sarthak-Universe-AI
AI-powered novel memory and chat system for the Sarthak Universe.
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sarthak Universe AI</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
background:black;
color:white;
overflow:hidden;
height:100vh;
}

/* Background */

body::before{
content:"";
position:fixed;
width:100%;
height:100%;
background:
radial-gradient(circle at center,
rgba(255,120,0,0.18),
black 70%);
z-index:-2;
}

/* Particles */

.particle{
position:fixed;
width:2px;
height:2px;
background:orange;
border-radius:50%;
opacity:0.7;
animation:float 10s linear infinite;
}

@keyframes float{
0%{
transform:translateY(100vh);
opacity:0;
}
20%{
opacity:1;
}
100%{
transform:translateY(-100vh);
opacity:0;
}
}

/* Layout */

.container{
display:flex;
height:100vh;
}

/* Sidebar */

.sidebar{
width:260px;
background:rgba(0,0,0,0.85);
border-right:1px solid rgba(255,140,0,0.2);
padding:20px;
transition:0.3s;
overflow:auto;
}

.logo{
font-size:32px;
font-weight:bold;
color:orange;
margin-bottom:10px;
}

.subtitle{
color:#bbb;
margin-bottom:30px;
}

.menu-btn{
width:100%;
padding:16px;
margin-bottom:15px;
background:rgba(255,120,0,0.08);
border:1px solid rgba(255,140,0,0.15);
border-radius:14px;
color:white;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

.menu-btn:hover{
background:rgba(255,140,0,0.2);
transform:translateX(4px);
box-shadow:0 0 15px rgba(255,140,0,0.3);
}

/* Chat Area */

.chat-area{
flex:1;
display:flex;
flex-direction:column;
height:100vh;
}

/* Top */

.topbar{
padding:20px;
border-bottom:1px solid rgba(255,140,0,0.15);
display:flex;
justify-content:space-between;
align-items:center;
background:rgba(0,0,0,0.35);
backdrop-filter:blur(10px);
}

.top-title{
font-size:34px;
font-weight:bold;
color:orange;
}

.memory{
padding:10px 20px;
border-radius:30px;
border:1px solid rgba(255,140,0,0.2);
background:rgba(255,120,0,0.05);
color:#ffb366;
}

/* Messages */

.messages{
flex:1;
padding:25px;
overflow-y:auto;
display:flex;
flex-direction:column;
gap:20px;
}

/* Bubbles */

.message{
max-width:80%;
padding:18px;
border-radius:18px;
line-height:1.7;
animation:fadeIn 0.3s ease;
}

.user{
align-self:flex-end;
background:rgba(255,140,0,0.18);
border:1px solid rgba(255,140,0,0.25);
}

.ai{
align-self:flex-start;
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.06);
}

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(10px);
}
to{
opacity:1;
transform:translateY(0);
}
}

/* Typing */

.typing{
display:none;
padding:15px 20px;
background:rgba(255,255,255,0.05);
width:120px;
border-radius:20px;
}

.typing span{
display:inline-block;
width:8px;
height:8px;
background:orange;
border-radius:50%;
margin:0 3px;
animation:bounce 1s infinite;
}

.typing span:nth-child(2){
animation-delay:0.2s;
}

.typing span:nth-child(3){
animation-delay:0.4s;
}

@keyframes bounce{
0%,80%,100%{
transform:scale(0.7);
opacity:0.5;
}
40%{
transform:scale(1);
opacity:1;
}
}

/* Input */

.input-area{
padding:20px;
display:flex;
gap:15px;
border-top:1px solid rgba(255,140,0,0.15);
background:rgba(0,0,0,0.4);
backdrop-filter:blur(10px);
}

.input-area input{
flex:1;
padding:18px;
border:none;
outline:none;
border-radius:16px;
background:rgba(255,255,255,0.05);
color:white;
font-size:16px;
}

.send-btn{
padding:18px 30px;
border:none;
border-radius:16px;
background:linear-gradient(to right,#ff7b00,#ffb300);
color:black;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

.send-btn:hover{
transform:scale(1.05);
box-shadow:0 0 20px orange;
}

/* Mobile */

.toggle-btn{
display:none;
position:absolute;
top:20px;
left:20px;
background:orange;
color:black;
padding:10px 14px;
border-radius:10px;
font-weight:bold;
z-index:1000;
cursor:pointer;
}

@media(max-width:900px){

.sidebar{
position:fixed;
left:-280px;
top:0;
height:100%;
z-index:999;
}

.sidebar.active{
left:0;
}

.toggle-btn{
display:block;
}

.top-title{
font-size:24px;
padding-left:50px;
}

.message{
max-width:95%;
}

}

</style>
</head>

<body>

<!-- particles -->

<script>
for(let i=0;i<40;i++){
let p=document.createElement("div");
p.className="particle";
p.style.left=Math.random()*100+"vw";
p.style.animationDuration=(5+Math.random()*10)+"s";
p.style.opacity=Math.random();
document.body.appendChild(p);
}
</script>

<div class="toggle-btn" onclick="toggleSidebar()">☰</div>

<div class="container">

<!-- Sidebar -->

<div class="sidebar" id="sidebar">

<div class="logo">Immortal Systems</div>
<div class="subtitle">Heavenly Archive Interface</div>

<button class="menu-btn">💬 Heavenly Chat Hall</button>
<button class="menu-btn">📜 Chapter Archive</button>
<button class="menu-btn">⚔ Character Records</button>
<button class="menu-btn">🔥 Cultivation Realms</button>
<button class="menu-btn">⏳ Timeline Engine</button>
<button class="menu-btn">🏯 Sect Management</button>

</div>

<!-- Main -->

<div class="chat-area">

<div class="topbar">
<div class="top-title">Heavenly Memory Core</div>
<div class="memory">12,847 Lore Threads Active</div>
</div>

<div class="messages" id="messages">

<div class="message ai">
Welcome back, Sect Master. The Heavenly Archive has synchronized successfully.
</div>

</div>

<!-- typing -->

<div class="typing" id="typing">
<span></span>
<span></span>
<span></span>
</div>

<!-- input -->

<div class="input-area">

<input
type="text"
id="userInput"
placeholder="Ask the Heavenly Archive..."
>

<button class="send-btn" onclick="sendMessage()">
Send
</button>

</div>

</div>

</div>

<script>

function toggleSidebar(){
document.getElementById("sidebar")
.classList.toggle("active");
}

function sendMessage(){

const input=document.getElementById("userInput");
const text=input.value.trim();

if(text==="") return;

const messages=document.getElementById("messages");

const userDiv=document.createElement("div");
userDiv.className="message user";
userDiv.innerText=text;

messages.appendChild(userDiv);

input.value="";

messages.scrollTop=messages.scrollHeight;

const typing=document.getElementById("typing");
typing.style.display="block";

messages.appendChild(typing);

messages.scrollTop=messages.scrollHeight;

setTimeout(()=>{

typing.style.display="none";

const aiDiv=document.createElement("div");
aiDiv.className="message ai";

let replies=[
"The Heavenly Archive is analyzing your command.",
"Ancient lore threads have been awakened.",
"The cultivation records are being synchronized.",
"The Heavenly Memory Core has discovered hidden connections.",
"Sect Master, the requested knowledge has been retrieved."
];

aiDiv.innerText=
replies[Math.floor(Math.random()*replies.length)];

messages.appendChild(aiDiv);

messages.scrollTop=messages.scrollHeight;

},1500);

}

</script>

</body>
</html>
